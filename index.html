<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shashidhar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #cddcea;
      --glass-nav-bg:    rgba(255, 255, 255, 0.12);
      --glass-nav-bdr:   rgba(255, 255, 255, 0.32);
      --glass-blur:      blur(40px) saturate(200%) brightness(1.04);
      --glass-card-bg:   rgba(255, 255, 255, 0.08);
      --glass-card-bdr:  rgba(255, 255, 255, 0.28);
      --glass-highlight: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 0 0 1px rgba(255,255,255,0.06);
      --shadow-soft:     0 8px 48px rgba(60, 80, 120, 0.08), 0 2px 8px rgba(60,80,120,0.04), var(--glass-highlight);
      --text-primary:    #121826;
      --text-secondary:  #4b5563;
      --accent:          #121826;
      --font: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --nav-h: 72px;
      --h-big:   clamp(48px, 7.5vw, 92px);
      --h-small: clamp(30px, 4vw,   52px);
      --dur: 0.85s;
      --ease: cubic-bezier(0.77, 0, 0.175, 1);
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: #cddcea; overflow-x: hidden; }

    .bg-orbs { position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden; }
    .orb { position:absolute;border-radius:50%;filter:blur(90px);opacity:.60;animation:drift 22s ease-in-out infinite alternate; }
    .orb-1{width:620px;height:620px;background:radial-gradient(circle,#a4c8e8,#7ba7cc 60%,transparent);top:-180px;left:-160px;animation-delay:0s}
    .orb-2{width:500px;height:500px;background:radial-gradient(circle,#c0b2e8,#9880d4 60%,transparent);top:30%;right:-130px;animation-delay:-8s}
    .orb-3{width:440px;height:440px;background:radial-gradient(circle,#b4ddd0,#82c2ab 60%,transparent);bottom:2%;left:14%;animation-delay:-15s}
    .orb-4{width:340px;height:340px;background:radial-gradient(circle,#f0d0bc,#d8a87c 60%,transparent);top:54%;left:55%;animation-delay:-5s}
    .orb-5{width:280px;height:280px;background:radial-gradient(circle,#fad8dc,#f2a4ae 60%,transparent);top:8%;left:42%;animation-delay:-11s}
    .orb-6{width:200px;height:200px;background:radial-gradient(circle,#d4ecc0,#a4d480 60%,transparent);top:70%;right:20%;animation-delay:-3s}
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(48px,-38px) scale(1.07)} 66%{transform:translate(-28px,44px) scale(0.95)} 100%{transform:translate(34px,24px) scale(1.05)} }

    .nav-outer { position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 28px;background:transparent;backdrop-filter:none; }
    nav { display:flex;align-items:center;justify-content:space-between;background:var(--glass-nav-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-nav-bdr);border-radius:60px;padding:10px 10px 10px 28px;box-shadow:var(--shadow-soft);max-width:1400px;margin:0 auto;gap:20px; }
    #nav-brand { font-size:16.5px;font-weight:600;color:var(--text-primary);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;text-decoration:none; }
    #nav-links { display:flex;align-items:center;flex:1;justify-content:center; }
    #nav-links ul { list-style:none;display:flex;gap:2px; }
    #nav-links a { text-decoration:none;font-size:14px;font-weight:400;color:var(--text-secondary);padding:6px 15px;border-radius:50px;transition:color .2s;white-space:nowrap; }
    #nav-links a:hover { color:var(--text-primary); }
    .nav-actions { display:flex;align-items:center;gap:8px;flex-shrink:0; }
    .btn-ghost { background:transparent;border:none;font-size:14px;font-weight:400;color:var(--text-secondary);padding:8px 15px;border-radius:50px;cursor:pointer;font-family:var(--font);transition:color .2s;white-space:nowrap; }
    .btn-ghost:hover { color:var(--text-primary); }
    .btn-cta { display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:500;padding:10px 22px;border-radius:50px;cursor:pointer;font-family:var(--font);text-decoration:none;box-shadow:0 2px 16px rgba(20,20,42,.30);white-space:nowrap; }
    .btn-cta svg { width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0; }

    #fixed-heading {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 150;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      opacity: 1;
      transition:
        top       var(--dur) var(--ease),
        left      var(--dur) var(--ease),
        transform var(--dur) var(--ease),
        font-size var(--dur) var(--ease),
        opacity   var(--dur) var(--ease);
    }
    #fixed-heading h1 {
      font-family: var(--font-display);
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -2.5px;
      line-height: 1.05;
      font-size: var(--h-big);
      transition: font-size var(--dur) var(--ease);
    }
    #fixed-heading h1 strong {
      font-weight: 700;
      display: inline-block;
      transition: transform var(--dur) var(--ease), letter-spacing var(--dur) var(--ease);
    }

    #fixed-heading.intro-mode {
      top: calc(var(--nav-h) + 36px);
      /* Align with inner text of .intro-card: 48px (inner padding) + 52px (card padding) */
      left: max(100px, calc(50% - 600px));
      transform: translate(0, 0);
      text-align: left;
    }
    #fixed-heading.intro-mode h1 { font-size: var(--h-small); }
    #fixed-heading.intro-mode h1 strong {
      transform: scaleX(0.98) scaleY(1.02);
      letter-spacing: -0.5px;
    }

    #fixed-heading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: none;
    }

    #scroll-viewport { position:fixed;inset:0;overflow:hidden;z-index:1; }
    #scroll-track { display:flex;flex-direction:column;width:100%;will-change:transform;transition:transform var(--dur) var(--ease); }

    #section-hero { width: 100%; height: 100vh; flex-shrink: 0; }
    
    #section-intro {
      width: 100%; height: 100vh;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      overflow-y: auto;
      padding: calc(var(--nav-h) + 36px + var(--h-small) * 1.2 + 32px) 0 60px;
    }
    .intro-inner { max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 48px; }
    .intro-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 28px;
      padding: 48px 52px;
      box-shadow: var(--shadow-soft);
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }
    .intro-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }
    .intro-who-title {
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 300; color: var(--text-primary);
      letter-spacing: -1px; line-height: 1.1;
      margin-bottom: 28px;
    }
    .intro-who-title strong { font-weight: 600; }
    .intro-paragraphs { display:flex;flex-direction:column;gap:18px; }
    .intro-paragraphs p { font-size:16.5px;color:var(--text-secondary);line-height:1.80;font-weight:400;transition:color .3s ease; }
    .intro-paragraphs p strong { color:var(--text-primary);font-weight:600; }
    .intro-card:hover .intro-paragraphs p { color: rgba(20,20,42,0.80); }

    /* ─── EXPERIENCE ─────────────────────────────────────────────── */
    #section-experience {
      width: 100%; height: 100vh;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      padding: calc(var(--nav-h) + 60px) 0 100px;
      scrollbar-width: thin;
      scrollbar-color: rgba(20,20,42,0.15) transparent;
    }
    #section-experience::-webkit-scrollbar { width: 6px; }
    #section-experience::-webkit-scrollbar-track { background: transparent; }
    #section-experience::-webkit-scrollbar-thumb { background: rgba(20,20,42,0.15); border-radius: 3px; }
    #section-experience::-webkit-scrollbar-thumb:hover { background: rgba(20,20,42,0.25); }

    .exp-inner { max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 48px; }
    .exp-title {
      font-size: clamp(32px, 4.5vw, 56px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -1.5px;
      line-height: 1.05;
      margin-bottom: 52px;
    }
    .exp-title strong { font-weight: 700; }

    .exp-timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .exp-timeline::before {
      content: '';
      position: absolute;
      left: 18px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(20,20,42,0.18) 8%, rgba(20,20,42,0.18) 92%, transparent);
    }

    .exp-item {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 0 20px;
      padding-bottom: 40px;
    }
    .exp-item:last-child { padding-bottom: 0; }

    .exp-dot-col { display:flex;flex-direction:column;align-items:center;padding-top:6px;z-index:1; }
    .exp-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-primary);
      border: 2px solid rgba(255,255,255,0.70);
      box-shadow: 0 0 0 3px rgba(20,20,42,0.10);
      flex-shrink: 0;
    }
    .exp-item:first-child .exp-dot {
      box-shadow: 0 0 0 4px rgba(20,20,42,0.12), 0 0 14px rgba(20,20,42,0.20);
    }

    .exp-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 22px;
      padding: 28px 32px;
      box-shadow: var(--shadow-soft);
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }
    .exp-card:hover { 
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }
    .exp-org { font-size:13.5px;font-weight:400;color:var(--text-secondary);margin-bottom:16px;transition:color .3s ease; }
    .exp-card:hover .exp-org { color: rgba(20,20,42,0.75); }
    .exp-bullets { display:flex;flex-direction:column;gap:10px;list-style:none; }
    .exp-bullets li { display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--text-secondary);line-height:1.65;transition:color .3s ease; }
    .exp-card:hover .exp-bullets li { color: rgba(20,20,42,0.75); }

    .exp-card-header { display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:8px;flex-wrap:wrap; }
    .exp-role { font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:-0.3px;line-height:1.3; }
    .exp-date-pill {
      display: inline-flex;
      align-items: center;
      background: rgba(20,20,42,0.07);
      border: 1px solid rgba(20,20,42,0.10);
      border-radius: 50px;
      padding: 3px 12px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .exp-org { font-size:13.5px;font-weight:400;color:var(--text-secondary);margin-bottom:16px; }
    .exp-bullets { display:flex;flex-direction:column;gap:10px;list-style:none; }
    .exp-bullets li { display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--text-secondary);line-height:1.65; }
    .exp-bullets li::before { content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--text-primary);opacity:0.35;flex-shrink:0;margin-top:8px; }

    /* ─── PROJECTS ────────────────────────────────────────────────── */
    #section-projects {
      width: 100%; height: 100vh;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      padding: calc(var(--nav-h) + 60px) 0 100px;
      scrollbar-width: thin;
      scrollbar-color: rgba(20,20,42,0.15) transparent;
    }
    #section-projects::-webkit-scrollbar { width: 6px; }
    #section-projects::-webkit-scrollbar-track { background: transparent; }
    #section-projects::-webkit-scrollbar-thumb { background: rgba(20,20,42,0.15); border-radius: 3px; }

    .proj-inner {
      max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 48px;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      gap: 0 32px;
    }
    .proj-title {
      font-size: clamp(32px, 4.5vw, 56px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -1.5px;
      line-height: 1.05;
      margin-bottom: 36px;
      grid-column: 1 / -1;
    }
    .proj-title strong { font-weight: 700; }

    /* ── LIST COLUMN ── */
    .proj-list { display: flex; flex-direction: column; gap: 10px; }

    .proj-row {
      display: grid;
      grid-template-columns: 52px 1fr auto auto;
      align-items: center;
      gap: 0 16px;
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 18px;
      padding: 16px 20px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: background 0.3s ease;
      user-select: none;
    }
    .proj-row:hover {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }
    .proj-row.active {
      background: rgba(255,255,255,0.12);
    }
    .proj-desc { color: var(--text-secondary); transition: color 0.3s ease; }
    .proj-row:hover .proj-desc { color: rgba(20,20,42,0.75); }

    /* icon box — glass, neutral, on-theme */
    .proj-icon-box {
      width: 44px; height: 44px;
      border-radius: 13px;
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.58);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.70);
      flex-shrink: 0;
      color: var(--text-primary);
    }

    .proj-row-body { min-width: 0; }
    .proj-row-name {
      font-size: 15px; font-weight: 600;
      color: var(--text-primary); letter-spacing: -0.2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .proj-row-cats { display: flex; flex-wrap: wrap; gap: 5px; }
    .proj-cat {
      font-size: 11px; font-weight: 500;
      border-radius: 50px; padding: 2px 9px;
      line-height: 1.6;
      /* all categories share the same glass-neutral look */
      background: rgba(255,255,255,0.38);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.55);
    }
    /* kept for backwards-compat — all now use base style above */
    .proj-cat-cloud, .proj-cat-cyber, .proj-cat-devops,
    .proj-cat-aiml,  .proj-cat-obs,   .proj-cat-auto,
    .proj-cat-default { }

    .proj-row-tools { display: flex; align-items: center; gap: 5px; }
    .proj-tool-pill {
      font-size: 11px; font-weight: 400;
      background: rgba(255,255,255,0.40);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 50px; padding: 2px 10px;
      color: var(--text-secondary); white-space: nowrap;
    }
    .proj-tool-more {
      font-size: 11px; color: var(--text-secondary);
      white-space: nowrap;
    }

    .proj-row-year {
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary); white-space: nowrap;
      padding-left: 12px;
    }

    /* ── PREVIEW PANEL ── */
    .proj-preview {
      position: sticky;
      top: 0;
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .proj-preview-card {
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(34px) saturate(220%);
      -webkit-backdrop-filter: blur(34px) saturate(220%);
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      transition: opacity 0.25s ease;
    }
    .proj-preview-card.hidden { opacity: 0; pointer-events: none; }

    .proj-preview-visual {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a3e 0%, #0f2744 50%, #1a2a4a 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      position: relative;
      overflow: hidden;
    }
    /* subtle grid overlay on preview */
    .proj-preview-visual::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .proj-preview-body { padding: 20px 22px 22px; }
    .proj-preview-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .proj-preview-name {
      font-size: 17px; font-weight: 600;
      color: var(--text-primary); letter-spacing: -0.4px;
      line-height: 1.25; margin-bottom: 10px;
    }
    .proj-preview-desc {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.65; margin-bottom: 14px;
    }
    .proj-preview-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .proj-preview-pill {
      font-size: 11.5px; font-weight: 400;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: 50px; padding: 4px 12px;
      color: var(--text-primary);
    }

    @media (max-width: 860px) {
      .proj-inner { grid-template-columns: 1fr; }
      .proj-preview { display: none; }
    }

    /* ─── CERTIFICATIONS ──────────────────────────────────────────── */
    #section-certifications {
      width: 100%; height: 100vh;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      padding: calc(var(--nav-h) + 60px) 0 100px;
      scrollbar-width: thin;
      scrollbar-color: rgba(20,20,42,0.15) transparent;
    }
    #section-certifications::-webkit-scrollbar { width: 6px; }
    #section-certifications::-webkit-scrollbar-track { background: transparent; }
    #section-certifications::-webkit-scrollbar-thumb { background: rgba(20,20,42,0.15); border-radius: 3px; }

    .cert-inner { max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 48px; }
    .cert-title {
      font-size: clamp(32px, 4.5vw, 56px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -1.5px;
      line-height: 1.05;
      margin-bottom: 52px;
    }
    .cert-title strong { font-weight: 700; }

    /* Certifications — card layout */
    .cert-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .cert-row { display: grid; gap: 20px; }
    .cert-row.row-2 { grid-template-columns: 1fr 1fr; }
    .cert-row.row-3 { grid-template-columns: 1fr 1fr 1fr; }

    .cert-item {
      display: flex;
      flex-direction: column;
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .cert-item:hover {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    /* image area — large and prominent, full image no crop */
    .cert-image {
      width: 100%;
      aspect-ratio: 4/3;
      background: rgba(255,255,255,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--glass-card-bdr);
    }
    .cert-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .cert-image .cert-placeholder {
      font-size: 36px;
      opacity: 0.5;
    }

    /* text area below the image */
    .cert-text {
      padding: 16px 18px 18px;
      flex: 1;
    }
    .cert-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 5px;
      transition: color 0.3s ease;
    }
    .cert-item:hover .cert-name { color: rgba(20,20,42,0.85); }
    .cert-org {
      font-size: 12px;

  const ul = mk('ul');
  n.links.forEach(l => {
    const li = mk('li'); const a = mk('a'); a.href=l.href; a.textContent=l.label;
    li.appendChild(a); ul.appendChild(li);
  });
  linksWrap.appendChild(ul);
  const actions = mk('div','nav-actions');
  // Contact info → scroll to Get in Touch section
  const ghost = mk('button','btn-ghost');
  ghost.textContent = n.contactBtn;
  ghost.onclick = () => {

  actions.append(ghost, cta);
  nav.append(brand, linksWrap, actions);
  outer.appendChild(nav);
  return outer;

  title.innerHTML = `<strong>Experience</strong>`;
  
  const timeline = mk('div','exp-timeline');
  e.items.forEach((job, idx) => {
    const item = mk('div','exp-item sec-reveal');
    item.style.transitionDelay = `${0.08 + idx * 0.08}s`;
    const dotCol = mk('div','exp-dot-col');
    const dot = mk('div','exp-dot');
    dotCol.appendChild(dot);
    
    const card = mk('div','exp-card');
    const header = mk('div','exp-card-header');
    const role = mk('div','exp-role'); role.textContent = job.role;
    const date = mk('div','exp-date-pill'); date.textContent = job.duration;
    header.append(role, date);
    
    const org = mk('div','exp-org'); org.textContent = job.company;
    
    const bullets = mk('ul','exp-bullets');
    job.points.forEach(pt => { const li = mk('li'); li.textContent = pt; bullets.appendChild(li); });
    
    card.append(header, org, bullets);
    item.append(dotCol, card);
    timeline.appendChild(item);
  });
  
  inner.append(title, timeline);
  sec.appendChild(inner);
  return sec;
}

// Category → CSS class mapping. ADD new entries when you add new categories in SITE.
function projCatClass(cat) {
  const map = {
    'Cloud Engineering': 'proj-cat-cloud',
    'Cybersecurity':     'proj-cat-cyber',
    'DevOps':            'proj-cat-devops',
    'AI/ML':             'proj-cat-aiml',
    'Observability':     'proj-cat-obs',
    'Automation':        'proj-cat-auto',
    'Scripting':         'proj-cat-auto',
    'Compliance':        'proj-cat-cyber',
  };
  return map[cat] || 'proj-cat-default';
}

// Project icon map. ADD new entries to match project names.
function projIcon(name) {
  const map = {
    'Multi-Region Web Hosting on Azure': '☁️',
    'AI Security Operations Dashboard':  '🛡️',
    'Kubernetes GitOps Platform':        '⚙️',
    'Cloud Infrastructure Monitoring':   '📊',
    'Linux Security Hardening Suite':    '🔒',
    'Infrastructure Automation Toolkit': '🛠️',
  };
  return map[name] || '📁';
}

function buildProjects() {
  if (!SITE.projects || !SITE.projects.show) return null;
  const p = SITE.projects;
  const sec = mk('section'); sec.id='section-projects';
  const inner = mk('div','proj-inner');

  const title = mk('h2','proj-title sec-reveal');
  title.innerHTML = `<strong>Projects</strong>`;

  /* ── LIST ── */
  const list = mk('div','proj-list');

  /* ── PREVIEW PANEL ── */
  const preview = mk('div','proj-preview sec-reveal');
  preview.style.transitionDelay = '0.15s';
  const previewCard = mk('div','proj-preview-card hidden');

  const previewVisual = mk('div','proj-preview-visual');
  const previewEmojiEl = mk('span'); previewEmojiEl.style.cssText='position:relative;z-index:1;font-size:48px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))';
  previewVisual.appendChild(previewEmojiEl);

  const previewBody  = mk('div','proj-preview-body');
  const previewLbl   = mk('div','proj-preview-label');
  const previewName  = mk('div','proj-preview-name');
  const previewDesc  = mk('div','proj-preview-desc');
  const previewPills = mk('div','proj-preview-pills');
  previewBody.append(previewLbl, previewName, previewDesc, previewPills);
  previewCard.append(previewVisual, previewBody);
  preview.appendChild(previewCard);

  function showPreview(proj) {
    previewCard.classList.remove('hidden');
    previewEmojiEl.textContent = projIcon(proj.name);
    previewLbl.textContent  = proj.previewLabel || 'Project Preview';
    previewName.textContent = proj.name;
    previewDesc.textContent = proj.previewDesc  || proj.description;
    previewPills.innerHTML  = '';
    proj.tools.forEach(t => {
      const pill = mk('span','proj-preview-pill'); pill.textContent = t;
      previewPills.appendChild(pill);
    });
  }

  p.items.forEach((proj, idx) => {
    const row = mk('div','proj-row sec-reveal');
    row.style.transitionDelay = `${idx * 0.06}s`;
    if (idx === 0) { row.classList.add('active'); showPreview(proj); }

    /* icon box */
    const iconBox = mk('div','proj-icon-box'); iconBox.textContent = projIcon(proj.name);

    /* body */
    const body = mk('div','proj-row-body');
    const name = mk('div','proj-row-name'); name.textContent = proj.name;
    const cats = mk('div','proj-row-cats');
    (proj.categories || []).forEach(c => {
      const tag = mk('span','proj-cat ' + projCatClass(c)); tag.textContent = '• ' + c;
      cats.appendChild(tag);
    });
    body.append(name, cats);

    /* tools — show first 3, then "+N more" */
    const toolsEl = mk('div','proj-row-tools');
    const show = proj.tools.slice(0, 3);
    show.forEach(t => { const pill = mk('span','proj-tool-pill'); pill.textContent = t; toolsEl.appendChild(pill); });
    if (proj.tools.length > 3) {
      const more = mk('span','proj-tool-more'); more.textContent = `+${proj.tools.length - 3}`;
      toolsEl.appendChild(more);
    }

    /* year */
    const year = mk('div','proj-row-year'); year.textContent = proj.year || '';

    row.append(iconBox, body, toolsEl, year);

    row.addEventListener('mouseenter', () => {
      list.querySelectorAll('.proj-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      showPreview(proj);
    });

    list.appendChild(row);
  });

  inner.append(title, list, preview);
  sec.appendChild(inner);
  return sec;
}

function buildCertifications() {
  if (!SITE.certifications || !SITE.certifications.show) return null;
  const c = SITE.certifications;
  const sec = mk('section'); sec.id='section-certifications';
  const inner = mk('div','cert-inner');
  
  const title = mk('h2','cert-title sec-reveal');
  title.innerHTML = `<strong>Certifications</strong>`;
  
  const grid = mk('div','cert-grid');
  let certIdx = 0;

  // Build a card with prominent image + text below
  function makeCard(cert) {
    const item = mk('div','cert-item sec-reveal');
    item.style.transitionDelay = `${certIdx * 0.06}s`;
    certIdx++;

    const imgWrap = mk('div','cert-image');
    const img = document.createElement('img');
    img.src = cert.image;
    img.alt = cert.name;
    img.loading = 'lazy';
    img.onerror = function() {
      this.remove();
      const ph = mk('div','cert-placeholder'); ph.textContent = '📄';
      imgWrap.appendChild(ph);
    };
    imgWrap.appendChild(img);

    const text = mk('div','cert-text');
    const name = mk('div','cert-name'); name.textContent = cert.name;
    const org  = mk('div','cert-org');  org.textContent  = cert.org;
    text.append(name, org);

    item.append(imgWrap, text);
    return item;
  }

  // First row: 2 cards (IIT Roorkee + IBM)
  const row1 = mk('div','cert-row row-2');
  c.items.slice(0, 2).forEach(cert => row1.appendChild(makeCard(cert)));
  grid.appendChild(row1);

  // Remaining rows: 3 per row
  const rest = c.items.slice(2);
  for (let i = 0; i < rest.length; i += 3) {
    const row = mk('div','cert-row row-3');
    rest.slice(i, i + 3).forEach(cert => row.appendChild(makeCard(cert)));
    grid.appendChild(row);
  }
  
  inner.append(title, grid);
  sec.appendChild(inner);
  return sec;
}

// ── Social dock ────────────────────────────────────────────────────────────
function buildSocialDock() {
  const dock = document.getElementById('social-dock');
  SITE.contact.socials.forEach(s => {
    const btn = mk('a', 's-btn');
    btn.href = s.href;
    btn.target = s.href.startsWith('mailto') || s.href.startsWith('tel') ? '_self' : '_blank';
    btn.rel = 'noopener';
    btn.setAttribute('aria-label', s.label);
    // Icon on left, label on right — icon travels left as pill expands left
    const iconWrap = mk('span', 's-icon-wrap');
    iconWrap.innerHTML = s.icon;
    const label = mk('span', 's-label');
    label.textContent = s.value;
    btn.append(iconWrap, label);
    dock.appendChild(btn);
  });
}

// ── Contact section ────────────────────────────────────────────────────────
function buildContact() {
  const s = SITE.contact;
  const sec = mk('section'); sec.id = 'section-contact';
  const inner = mk('div','contact-inner');

  const title = mk('h2','contact-title');
  title.innerHTML = `Get in <strong>Touch</strong>`;

  const grid = mk('div','contact-grid');

  const socials = s.socials;
  // Row 1: first 2 (Email + Phone)
  const row1 = mk('div','contact-row row-2');
  // Row 2: remaining 3 (LinkedIn, GitHub, Hashnode)
  const row2 = mk('div','contact-row row-3');

  socials.forEach((item, idx) => {
    const card = mk('a','c-card');
    card.href = item.href;
    card.target = item.href.startsWith('mailto') || item.href.startsWith('tel') ? '_self' : '_blank';
    card.rel = 'noopener';
    card.style.transitionDelay = `${idx * 0.1}s`;

    const iconBox = mk('div','c-icon');
    iconBox.innerHTML = item.icon;
    const text  = mk('div','c-text');
    const label = mk('div','c-label'); label.textContent = item.label;
    const value = mk('div','c-value'); value.textContent = item.value;
    text.append(label, value);
    card.append(iconBox, text);

    if (idx < 2) row1.appendChild(card);
    else         row2.appendChild(card);
  });

  grid.append(row1, row2);
  inner.append(title, grid);
  sec.appendChild(inner);
  return sec;
}

(function render() {
  document.getElementById('page-root').appendChild(buildNav());
  buildSocialDock();
  const track = document.getElementById('scroll-track');
  const hero = buildHero();
  const intro = buildIntro();
  const experience = buildExperience();
  const projects = buildProjects();
  const certifications = buildCertifications();
  const contact = buildContact();
  if (hero)  track.appendChild(hero);
  if (intro) track.appendChild(intro);
  if (experience) track.appendChild(experience);
  if (projects) track.appendChild(projects);
  if (certifications) track.appendChild(certifications);
  if (contact) track.appendChild(contact);
})();

(function initScroll() {
  const track = document.getElementById('scroll-track');
  const heading = document.getElementById('fixed-heading');
  const panels = Array.from(track.children);
  let current = 0;
  let animating = false;
  const DUR_MS = 900;

  const dock = document.getElementById('social-dock');
  const CONTACT_IDX = panels.findIndex(p => p.id === 'section-contact');

  function activateContact(on) {
    const sec = document.getElementById('section-contact');
    const cards = sec ? sec.querySelectorAll('.c-card') : [];
    const titleEl = sec ? sec.querySelector('.contact-title') : null;

    if (on) {
      dock.classList.add('contact-mode');

      // Stagger cards in — force reflow so it replays every visit
      if (titleEl) { titleEl.classList.remove('visible'); void titleEl.offsetWidth; }
      cards.forEach(c => { c.classList.remove('visible'); void c.offsetWidth; });
      requestAnimationFrame(() => {
        if (titleEl) titleEl.classList.add('visible');
        cards.forEach(c => c.classList.add('visible'));
      });
    } else {
      dock.classList.remove('contact-mode');
      cards.forEach(c => c.classList.remove('visible'));
      if (titleEl) titleEl.classList.remove('visible');
    }
  }

  // Generic dissolve-in reveal for any panel's .sec-reveal elements
  // (Intro, Experience, Projects, Certifications titles/cards/rows).
  // Forces a reflow so the animation restarts every single time the
  // panel is entered, regardless of scroll direction.
  function activatePanelReveal(panel, on) {
    if (!panel) return;
    const items = panel.querySelectorAll('.sec-reveal');
    if (!items.length) return;
    if (on) {
      items.forEach(el => {
        el.classList.remove('visible');
        // force reflow so the browser registers the "not visible" state
        // before we add it back — guarantees the transition replays.
        void el.offsetWidth;
      });
      requestAnimationFrame(() => {
        items.forEach(el => el.classList.add('visible'));
      });
    } else {
      items.forEach(el => el.classList.remove('visible'));
    }
  }

  function goTo(index) {
    if (index < 0 || index >= panels.length || animating) return;
    animating = true;
    const prevIndex = current;
    current = index;

    // ── Reset scroll to top so section title is always visible ─────
    panels[index].scrollTop = 0;

    track.style.transform = `translateY(-${index * 100}vh)`;

    // ── Heading logic ──────────────────────────────────────────────
    if (index === 0) {
      // Hero: always show centered. Snap instantly (no slide)
      heading.style.transition = 'none';
      heading.classList.remove('intro-mode', 'hidden');
      heading.getBoundingClientRect();
      heading.style.transition = '';
    } else if (index === 1) {
      // Who Am I: only animate the slide when coming FORWARD from hero
      if (prevIndex === 0) {
        heading.classList.remove('hidden');
        heading.classList.add('intro-mode');
      } else {
        // Coming backward from deeper section — keep heading hidden
        heading.style.transition = 'none';
        heading.classList.remove('intro-mode');
        heading.classList.add('hidden');
        heading.getBoundingClientRect();
        heading.style.transition = '';
      }
    } else {
      heading.classList.remove('intro-mode');
      heading.classList.add('hidden');
    }

    // ── Contact section activation ─────────────────────────────────
    if (index === CONTACT_IDX) {
      activateContact(true);
    } else {
      activateContact(false);
    }

    // ── Generic reveal animation for all other panels ───────────────
    if (prevIndex !== index) {
      activatePanelReveal(panels[prevIndex], false);
    }
    if (index !== CONTACT_IDX) {
      activatePanelReveal(panels[index], true);
    }

    setTimeout(() => { animating = false; }, DUR_MS);
  }

  // Expose goTo so nav Contact Info button can use it
  window._goTo = goTo;

  let wheelAccum = 0;
  const WHEEL_THRESHOLD = 40;

  window.addEventListener('wheel', e => {
    if (animating) return;

    const currentPanel = panels[current];
    if (currentPanel && (currentPanel.id === 'section-experience' || currentPanel.id === 'section-projects' || currentPanel.id === 'section-certifications' || currentPanel.id === 'section-contact')) {
      const isAtBottom = currentPanel.scrollHeight - currentPanel.scrollTop <= currentPanel.clientHeight + 5;
      const isAtTop = currentPanel.scrollTop <= 5;

      if (e.deltaY > 0 && isAtBottom) {
        e.preventDefault();
        wheelAccum = 0;
        goTo(current + 1);
        return;
      } else if (e.deltaY < 0 && isAtTop) {
        e.preventDefault();
        wheelAccum = 0;
        goTo(current - 1);
        return;
      }
      return;
    }

    e.preventDefault();
    wheelAccum += e.deltaY;

    if (wheelAccum > WHEEL_THRESHOLD) { wheelAccum = 0; goTo(current + 1); }
    if (wheelAccum < -WHEEL_THRESHOLD) { wheelAccum = 0; goTo(current - 1); }
  }, { passive: false });

  let touchStartY = null;
  window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive:true });
  window.addEventListener('touchend', e => {
    if (touchStartY === null || animating) return;
    const delta = touchStartY - e.changedTouches[0].clientY;
    touchStartY = null;
    if (delta > 30) goTo(current + 1);
    if (delta < -30) goTo(current - 1);
  }, { passive:true });

  window.addEventListener('keydown', e => {
    if (e.key==='ArrowDown'||e.key==='PageDown') { e.preventDefault(); goTo(current+1); }
    if (e.key==='ArrowUp'  ||e.key==='PageUp'  ) { e.preventDefault(); goTo(current-1); }
  });

  document.addEventListener('click', e => {
    const a = e.target.closest('a[href^="#"]');
    if (!a) return;
    const id = a.getAttribute('href').slice(1);
    const idx = panels.findIndex(p => p.id === `section-${id}`);
    if (idx !== -1) { e.preventDefault(); goTo(idx); }
  });

})();
</script>
